El sistema de cotas del plano 2D (líneas rojas, números en metros, encuentros) está armado así:

Dónde se “dibuja” y define el comportamiento visual
Rol	Archivo
Componente SVG de cotas (horizontal/vertical, stack, encuentros)
src/components/roofPlan/RoofPlanDimensions.jsx — exporta EstructuraGlobalExteriorOverlay y helpers tipo ArchDimHorizontal / ArchDimVertical; el propio archivo indica que apoya en utils de tema y tipografía.
Tema (color rojo de cota, opacidad, capa data-bmc-layer, base de fuente)
src/utils/roofPlanDrawingTheme.js
Escala tipográfica y grosores según el viewBox (legibilidad móvil/desktop)
src/utils/roofPlanSvgTypography.js — buildRoofPlanSvgTypography, fmtArchMeters
Obstáculos para colisiones (rectángulos aprox. de cotas + textos de encuentro, alineados al overlay)
src/utils/roofPlanCotaObstacles.js — buildEstructuraCotaObstacleRects
Dónde se integra en la app
Rol	Archivo
Montaje en el visor, viewBox, cuándo mostrar cotas globales, apoyos/fijación
src/components/RoofPreview.jsx (importa EstructuraGlobalExteriorOverlay; comentario de cabecera enlaza cotas con RoofPlanDimensions y utils)
Márgenes / layout del plano (slack del viewBox, etc.)
src/hooks/useRoofPreviewPlanLayout.js
De dónde salen los datos (qué medir en planta)
Rol	Archivo
Geometría de aristas: perímetro exterior libre, encuentros, totales que alimentan las cotas
src/utils/roofPlanGeometry.js — buildRoofPlanEdges
No confundir con otra “dimensiones”
src/utils/dimensioningFormulas.js y DimensioningFormulasEditor.jsx son la lógica/parametría de cotización (fórmulas de negocio), no el dibujo SVG de cotas del techo.
El wizard “Dimensiones” del flujo vive sobre todo en PanelinCalculadoraV3_backup.jsx / QuoteVisualVisor.jsx (pasos UI), mientras que el dibujo técnico de cotas es el bloque de arriba.
Referencia explícita en el propio visor:


RoofPreview.jsx
Lines 1-5
// buildRoofPlanEdges muestra perímetro/encuentros. Cotas: `roofPlan/RoofPlanDimensions.jsx`, `utils/roofPlanSvgTypography.js`, `utils/roofPlanDrawingTheme.js`.
Si querés ir al núcleo: empezá por RoofPlanDimensions.jsx + roofPlanDrawingTheme.js + roofPlanSvgTypography.js; roofPlanGeometry.js para la semántica de qué segmentos se cotan.
