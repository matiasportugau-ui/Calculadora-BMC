      font-size: 2rem;
      text-align: center;
    }

    .v3d-simple-preloader-bar p {
      padding-top: 30px;
    }

    @media screen and (max-width: 992px) {
      .v3d-simple-preloader-bar {
        margin-left: 0;
      }

      .v3d-simple-preloader-logo {
        width: 100%;
        height: 51px;
        margin-top: 40px;
        margin-left: 0;
        background-size: cover;
      }

      #v3d-container {
        border: none;
      }
    }
