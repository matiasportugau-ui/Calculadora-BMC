openapi: 3.1.0
info:
  title: BMC Email Agent — API mínima
  version: 1.0.0
  description: |
    Solo correo: resumen PANELSIM (último sync IMAP clasificado) y borrador saliente sin envío.
    No incluye calculadora, ML, WhatsApp ni Finanzas.

    **Servidor:** la URL debe apuntar a una instancia donde la API lea el repo
    `conexion-cuentas-email-agentes-bmc` en disco (`BMC_EMAIL_INBOX_REPO` o carpeta hermana).
    Cloud Run estándar sin volumen suele devolver `email_repo_missing`.

    **Ingest CRM:** `POST /api/crm/ingest-email` requiere el mismo esquema Bearer que esta spec;
    el servidor acepta `API_AUTH_TOKEN` y, si está definido, `EMAIL_INGEST_TOKEN` (bridge IMAP).
    No está expuesto como Action en el GPT solo-correo por defecto; uso operativo vía script o orquestación.

servers:
  - url: https://REPLACE_WITH_YOUR_API_HOST
    description: Ej. https://xxx.ngrok-free.app o http://localhost:3001 (solo si OpenAI alcanza tu red)

security:
  - bearerAuth: []

paths:
  /api/email/panelsim-summary:
    get:
      operationId: obtener_resumen_bandeja
      summary: Resumen actual de correo (PANELSIM)
      description: |
        Obtiene `PANELSIM-STATUS.json` y el texto del último `PANELSIM-ULTIMO-REPORTE.md`.
        Si `ok` es false o `artifactsMissing` es true, indicá al usuario que ejecute
        `npm run panelsim:email-ready` en la máquina donde está el repo de correo.
        No inventes conteos: usá solo lo que devuelve la API.
      parameters:
        - name: reportMaxChars
          in: query
          description: Máximo de caracteres del Markdown del reporte (default interno ~24000).
          schema:
            type: integer
            minimum: 2000
            maximum: 100000
      responses:
        "200":
          description: Cuerpo JSON con ok, emailRepo, status, reportPreview, workflow, etc.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          description: Token inválido o ausente
        "503":
          description: API_AUTH_TOKEN no configurado en el servidor

  /api/email/draft-outbound:
    post:
      operationId: generar_borrador_email
      summary: Borrador asunto + cuerpo (no envía)
      description: |
        Genera texto para copiar en Thunderbird u otro cliente. No envía correo.
        role=proveedor para mails a proveedores; role=cliente para respuestas comerciales breves.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - hechos
              properties:
                role:
                  type: string
                  enum: [proveedor, cliente]
                  default: proveedor
                hechos:
                  type: string
                  description: Contexto fiel (qué pasó, qué se pide). Mínimo ~3 caracteres.
                tono:
                  type: string
                  description: Ej. breve y profesional, formal
                asunto_contexto:
                  type: string
                  description: Asunto sugerido o hilo (opcional)
      responses:
        "200":
          description: ok, asunto, cuerpo, provider
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  asunto: { type: string }
                  cuerpo: { type: string }
                  provider: { type: string }
                  role: { type: string }
        "400":
          description: Falta hechos u error de validación
        "401":
          description: No autorizado
        "503":
          description: Sin API_AUTH_TOKEN o todos los proveedores IA fallaron

  /api/crm/ingest-email:
    post:
      operationId: ingest_email_crm
      summary: Ingest email parseado a CRM_Operativo (operativo)
      description: |
        Parsea cuerpo/asunto con IA y escribe fila en Sheets cuando hay credenciales.
        **Auth:** Bearer `API_AUTH_TOKEN` o `EMAIL_INGEST_TOKEN` (si el servidor lo define).
        Sin token válido → 401; sin ningún secreto configurado → 503.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cuerpo
              properties:
                asunto:
                  type: string
                cuerpo:
                  type: string
                remitente:
                  type: string
                messageId:
                  type: string
                threadId:
                  type: string
                account:
                  type: string
      responses:
        "200":
          description: |
            Resultado del parseo + escritura. `data` es el lead estructurado
            (esquema `CrmLead`). `crmRow` es el nº de fila escrito en
            `CRM_Operativo`, o `null` cuando no se escribió. `degraded` es
            `true` si la estructura de la planilla no pudo validarse y el lead
            quedó en estado **Pendiente** para revisión manual (no se escribió
            fila para evitar corromper columnas).
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - data
                properties:
                  ok:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/CrmLead"
                  provider:
                    type: string
                    nullable: true
                  crmRow:
                    type: integer
                    nullable: true
                  degraded:
                    type: boolean
                    description: true si el lead se enrutó a Pendientes sin escribir por anomalía estructural.
                  degradeReason:
                    type: string
                    nullable: true
                  messageId:
                    type: string
                    nullable: true
        "400":
          description: Falta cuerpo
        "401":
          description: Token inválido o ausente
        "503":
          description: Sin API_AUTH_TOKEN ni EMAIL_INGEST_TOKEN, o proveedores IA / Sheets no disponibles

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: API_AUTH_TOKEN del servidor; en ingest también válido EMAIL_INGEST_TOKEN si está configurado.
      bearerFormat: API_AUTH_TOKEN
  schemas:
    CrmLead:
      type: object
      description: |
        Lead estructurado que el parser produce y escribe en `CRM_Operativo`.
        **Contrato key-based:** TODAS las claves deben estar presentes. Si un
        dato no está disponible (ej. `telefono`), enviá `""` — NUNCA omitas la
        clave. El escritor mapea cada clave a su columna por NOMBRE de cabecera
        (fila 3), nunca por posición de array, de modo que un campo vacío jamás
        desplaza las columnas siguientes (bug de column-shift). Ver
        `server/lib/crmRowMapper.js`.
      required:
        - cliente
        - telefono
        - ubicacion
        - email_remitente
        - resumen_pedido
        - categoria
        - urgencia
        - tipo_cliente
        - cotizacion_formal
        - validar_stock
        - probabilidad_cierre
        - observaciones
      additionalProperties: false
      properties:
        cliente:
          type: string
          default: ""
          description: Nombre del cliente. "" si no se pudo extraer.
        telefono:
          type: string
          default: ""
          description: Teléfono explícito; "" si no aparece (no se infiere).
        ubicacion:
          type: string
          default: ""
          description: Ciudad / departamento / zona / dirección de obra.
        email_remitente:
          type: string
          default: ""
        resumen_pedido:
          type: string
          default: ""
        categoria:
          type: string
          default: ""
          description: Accesorios | Paneles techo | Paneles pared | Proyecto completo | Ferretería | Repuestos | Servicio/instalación | Otro
        urgencia:
          type: string
          default: ""
          description: Hoy | 24h | Esta semana | Este mes | Sin urgencia
        tipo_cliente:
          type: string
          default: ""
          description: Particular | Empresa | Arquitecto | Constructor | Distribuidor | Instalador | Cliente existente | Sin clasificar
        cotizacion_formal:
          type: string
          default: ""
          description: Si | No
        validar_stock:
          type: string
          default: ""
          description: Si | No
        probabilidad_cierre:
          type: string
          default: ""
          description: Alta | Media | Baja
        observaciones:
          type: string
          default: ""
