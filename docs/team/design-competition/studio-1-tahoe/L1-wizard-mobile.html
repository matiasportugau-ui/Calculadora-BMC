<!DOCTYPE html>
<html lang="es" data-studio="tahoe">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=390, initial-scale=1" />
  <title>Studio Tahoe · Calculator Wizard · Mobile</title>
  <link rel="stylesheet" href="../_shared/tokens-base.css" />
  <link rel="stylesheet" href="../_shared/breakpoints.css" />
  <link rel="stylesheet" href="../_shared/studio-themes.css" />
  <style>
    body { padding: 16px; background: #e8e8ed; }
    a.back { font-size: 12px; color: var(--bmc-primary); }
  </style>
</head>
<body>
  <p class="preview-meta"><a class="back" href="../../index.html">← Competition hub</a> · Studio Tahoe · L1 Calculator Wizard · Mobile (390px)</p>
  <div class="preview-frame preview-frame--mobile" data-studio="tahoe">
    
      <header class="chrome-glass" style="padding:10px 16px;display:flex;justify-content:space-between;align-items:center">
        <strong style="font-size:14px">Solo Techo · Paso 4/11</strong>
        <span class="mono" style="font-size:13px;color:var(--bmc-success)">USD 12,450</span>
      </header>
      <div style="display:grid;grid-template-columns:1fr;gap:16px;padding:16px">
        <section class="card" style="padding:16px">
          <h3 style="margin:0 0 12px;font-size:16px">Dimensiones (m)</h3>
          <label style="display:block;font-size:12px;color:var(--bmc-text-2);margin-bottom:4px">Largo zona 1</label>
          <input type="text" value="12,0" style="width:100%;padding:12px;border:1px solid var(--bmc-border);border-radius:var(--bmc-radius-sm);font-size:16px;margin-bottom:12px" />
          <label style="display:block;font-size:12px;color:var(--bmc-text-2);margin-bottom:4px">Ancho</label>
          <input type="text" value="8,5" style="width:100%;padding:12px;border:1px solid var(--bmc-border);border-radius:var(--bmc-radius-sm);font-size:16px" />
          <div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap"><span style="padding:6px 10px;border-radius:999px;font-size:11px;background:var(--bmc-surface-alt);color:var(--bmc-text-2)">Escenario</span><span style="padding:6px 10px;border-radius:999px;font-size:11px;background:var(--bmc-surface-alt);color:var(--bmc-text-2)">Familia</span><span style="padding:6px 10px;border-radius:999px;font-size:11px;background:var(--bmc-surface-alt);color:var(--bmc-text-2)">Espesor</span><span style="padding:6px 10px;border-radius:999px;font-size:11px;background:var(--bmc-primary);color:#fff">Dimensiones</span><span style="padding:6px 10px;border-radius:999px;font-size:11px;background:var(--bmc-surface-alt);color:var(--bmc-text-2)">Estructura</span><span style="padding:6px 10px;border-radius:999px;font-size:11px;background:var(--bmc-surface-alt);color:var(--bmc-text-2)">Proyecto</span></div>
        </section>
        
      </div>
      <footer style="padding:12px 16px;display:flex;justify-content:space-between;border-top:1px solid var(--bmc-border);background:var(--bmc-surface)">
        <button class="btn btn-secondary">Anterior</button>
        <button class="btn btn-primary">Siguiente</button>
      </footer>
  </div>
</body>
</html>
