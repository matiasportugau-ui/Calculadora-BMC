openapi: 3.1.0
info:
  title: PAOS Admin API
  version: 0.1.0-target
  description: TARGET for G2. Superadmin promote. Flags PAOS_ENABLED/PAOS_PROMOTE.
servers:
  - url: https://panelin-calc-q74zutv7dq-uc.a.run.app
  - url: http://127.0.0.1:3001
paths:
  /api/paos/candidates:
    get:
      security: [{ bearerAuth: [] }]
      responses: { "200": { description: OK } }
  /api/paos/candidates/{id}/approve:
    post:
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: OK }, "409": { description: Illegal } }
  /api/paos/candidates/{id}/reject:
    post:
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: OK } }
  /api/paos/versions/{id}/rollback:
    post:
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: OK } }
  /api/paos/events:
    get:
      security: [{ bearerAuth: [] }]
      responses: { "200": { description: OK } }
  /api/paos/metrics:
    get:
      security: [{ bearerAuth: [] }]
      responses: { "200": { description: OK } }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer }
