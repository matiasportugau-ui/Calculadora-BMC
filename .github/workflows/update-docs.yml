name: Daily Docs Updater

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-docs-updater
  cancel-in-progress: false

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install google-genai

      - name: Safety unit checks (no API key)
        run: python scripts/doc_agent_safety.py

      - name: Run README Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/doc_agent.py

      - name: Commit & push if changed
        run: |
          git config user.name "readme-agent[bot]"
          git config user.email "readme-agent[bot]@users.noreply.github.com"
          # Only README.md is in scope for this agent (never stage docs/ or CHANGELOG).
          git add README.md
          if git diff --staged --quiet; then
            echo "No documentation changes"
          else
            git commit -m "docs: auto-update by README Agent $(date -u +%Y-%m-%d)"
            git push
          fi
