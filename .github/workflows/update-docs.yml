name: Daily Docs Updater

on:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install google-genai pyyaml gitpython

      - name: Run README Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/doc_agent.py

      - name: Commit & push if changed
        run: |
          git config user.name "readme-agent[bot]"
          git config user.email "readme-agent[bot]@users.noreply.github.com"
          git add README.md docs/ CHANGELOG.md || true
          if git diff --staged --quiet; then
            echo "No documentation changes"
          else
            git commit -m "docs: auto-update by README Agent $(date -u +%Y-%m-%d)"
            git push
          fi
