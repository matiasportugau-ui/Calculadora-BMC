# Catalog ↔ MATRIZ price diff (WOLF-2026-0004 etapa 2).
# Control determinístico (no-LLM) que pidió Ramiro: atrapa divergencias de precio
# y valores fuera de rango entre `src/data/constants.js` y la MATRIZ viva.
#
# Reutiliza el service-account YA montado en la API de prod (sirve el CSV MATRIZ
# en GET /api/actualizar-precios-calculadora). NO crea credenciales nuevas.
# Si la MATRIZ no está disponible, el script hace skip elegante (exit 0) salvo
# que se pase --require-matriz.
name: Catalog ↔ MATRIZ diff

on:
  schedule:
    - cron: "0 9 * * *" # diario 09:00 UTC
  pull_request:
    paths:
      - "src/data/constants.js"
      - "scripts/catalog-diff.mjs"
  workflow_dispatch:
    inputs:
      api_base:
        description: "Override BMC_API_BASE (default: prod Cloud Run)"
        required: false
        default: ""
      soft:
        description: "Set to 1 para reporte sin fallar (no exit≠0 en S1)"
        required: false
        default: "0"

permissions:
  contents: read
  pull-requests: write

jobs:
  catalog-diff:
    name: catalog-diff.mjs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # Sin npm install: el script sólo usa fetch nativo + imports ESM locales.
      - name: Run catalog diff
        id: diff
        env:
          BMC_API_BASE: ${{ github.event.inputs.api_base || vars.BMC_SMOKE_API_BASE || '' }}
          BMC_CATALOG_DIFF_SOFT: ${{ github.event.inputs.soft == '1' && '1' || '' }}
        run: |
          set +e
          node scripts/catalog-diff.mjs --out catalog-diff-report.md
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: catalog-diff-report
          path: catalog-diff-report.md
          if-no-files-found: ignore

      - name: Upsert PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- catalog-diff-report -->';
            let body;
            if (fs.existsSync('catalog-diff-report.md')) {
              const md = fs.readFileSync('catalog-diff-report.md', 'utf8');
              // GitHub comment cap ~65k chars; truncar con aviso si hace falta.
              const capped = md.length > 60000
                ? md.slice(0, 60000) + '\n\n_… reporte truncado; ver el artifact `catalog-diff-report`._'
                : md;
              body = `${marker}\n${capped}`;
            } else {
              body = `${marker}\n## Catalog ↔ MATRIZ diff\n\nMATRIZ no disponible en CI — skip elegante (sin reporte). Ver logs del job.`;
            }
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.data.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Fail on S1 divergence / out-of-range
        if: steps.diff.outputs.exit_code != '0'
        run: |
          echo "::error::catalog-diff encontró hallazgos S1 (divergencia o fuera de rango). Ver el reporte."
          exit 1
