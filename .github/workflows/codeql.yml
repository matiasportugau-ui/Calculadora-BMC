# Static security analysis (CodeQL) for JS/TS. Findings surface in the
# Security tab; this workflow does not gate merges. Part of issue #492.
name: CodeQL
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1"
permissions:
  contents: read
  security-events: write
  actions: read
jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
