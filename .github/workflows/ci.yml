name: CI — Panelin Calculadora BMC

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # workflow_dispatch + schedule for knowledge antenna live in
  # knowledge-antenna-scheduled.yml so they do not run channels_pipeline (prod smoke).

jobs:
  validate:
    name: Validate Calculations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install ALSA headers
        run: bash scripts/ci-install-alsa-dev.sh

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Run validation tests
        run: node tests/validation.js

      - name: Build
        run: npm run build

  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install ALSA headers
        run: bash scripts/ci-install-alsa-dev.sh

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Run ESLint
        run: npm run lint

  env-drift:
    name: Env drift
    runs-on: ubuntu-latest
    needs: [validate, lint]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Check env-var drift
        run: node scripts/check-env-drift.mjs

  smoke:
    name: Smoke — prod API health (main only)
    runs-on: ubuntu-latest
    needs: [validate, lint]
    # Señal de prod-health, NO gate de deploy (ver nota en channels_pipeline);
    # el release lo valida el smoke post-deploy de deploy-calc-api.
    continue-on-error: true
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      issues: write # prod-alert (gh#495)

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install ALSA headers
        run: bash scripts/ci-install-alsa-dev.sh

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Smoke prod
        run: npm run smoke:prod
        env:
          # suggest-response now requires auth; the smoke presents this as x-api-key.
          # If the secret is unset, suggest-response 401s — smoke self-skips it only
          # when SMOKE_SKIP_SUGGEST=1, so keep the secret populated.
          API_AUTH_TOKEN: ${{ secrets.API_AUTH_TOKEN }}

      # continue-on-error deja el fallo como ❌ no-bloqueante que nadie mira;
      # este step lo convierte en issue de tracking (y lo cierra al recuperar).
      - name: Alert on prod-smoke failure (gh#495)
        if: always()
        uses: ./.github/actions/prod-alert
        with:
          job-name: smoke
          status: ${{ job.status }}

  # Cockpit E2E nivel 0 (read-only) contra prod. Señal de prod-health, NO gate de
  # deploy (igual que smoke/channels_pipeline → continue-on-error). Sólo recibe los
  # secretos de minteo de sesión; SIN COCKPIT_E2E_TEST_ROW/_TARGET ni SA JSON, así
  # que aunque se manipule el nivel, los guards fail-closed de L1/L2 abortan. Si
  # faltan los secretos de minteo, el cookie queda vacío → el spec hace skip-all
  # (no-op verde), nunca escribe nada.
  cockpit_e2e_readonly:
    name: Cockpit E2E — read-only (main only)
    runs-on: ubuntu-latest
    needs: [validate, lint]
    continue-on-error: true
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install ALSA headers
        run: bash scripts/ci-install-alsa-dev.sh

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Mint y consumo del cookie EN EL MISMO step (mismo idioma que product-docs.yml):
      # el cookie se enmascara y nunca se persiste como env del job. Sin TOUR_GOOGLE_*
      # → cookie vacío → el spec hace skip-all (no-op verde), nunca escribe nada.
      - name: Cockpit E2E level 0 (read-only)
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.TOUR_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.TOUR_GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.TOUR_GOOGLE_REFRESH_TOKEN }}
          COCKPIT_E2E_LEVEL: "0"
        run: |
          if [ -n "${GOOGLE_REFRESH_TOKEN}" ]; then
            COOKIE="$(node scripts/mint-tour-session.mjs)"
            echo "::add-mask::$COOKIE"
            TOUR_SESSION_COOKIE="$COOKIE" npm run test:e2e:cockpit
          else
            echo "Sin TOUR_GOOGLE_* secrets → skip-all (no-op)."
            npm run test:e2e:cockpit
          fi

  # Señal de prod-runtime-health (prod smoke + IA/suggest-response; sin secretos).
  # Sondea la revisión YA DESPLEGADA, así que NO debe gatear el deploy de código
  # nuevo: acoplarla al gate de deploy deadlockeaba releases (un prod en rojo
  # bloqueaba el propio deploy que lo arregla — deploy-calc-api exige que CI
  # concluya 'success'). Queda como señal visible vía continue-on-error; la
  # seguridad de release viene del smoke post-deploy de deploy-calc-api contra
  # la revisión recién desplegada.
  channels_pipeline:
    name: Channels — automated pipeline (prod)
    runs-on: ubuntu-latest
    needs: [validate, lint]
    continue-on-error: true
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      issues: write # prod-alert (gh#495)

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install ALSA headers
        run: bash scripts/ci-install-alsa-dev.sh

      - name: Install dependencies
        run: npm ci --include=dev

      - name: channels:automated (JSON)
        env:
          # Sin este token el smoke interno da 401 en suggest-response (gh#571)
          API_AUTH_TOKEN: ${{ secrets.API_AUTH_TOKEN }}
        run: node scripts/channels-automated-pipeline.mjs

      - name: Alert on prod-smoke failure (gh#495)
        if: always()
        uses: ./.github/actions/prod-alert
        with:
          job-name: channels_pipeline
          status: ${{ job.status }}

  voice_health:
    name: Voice — OpenAI key health (main only)
    runs-on: ubuntu-latest
    needs: [validate, lint]
    # Señal de prod-health, NO gate de deploy (ver nota en channels_pipeline).
    continue-on-error: true
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      issues: write # prod-alert (gh#495)

    steps:
      # Checkout solo para disponer de ./.github/actions/prod-alert (el probe no usa el repo).
      - name: Checkout
        uses: actions/checkout@v7

      - name: Probe /api/agent/voice/health on prod Cloud Run
        env:
          API_AUTH_TOKEN: ${{ secrets.API_AUTH_TOKEN }}
        run: |
          # Same default as scripts/smoke-prod-api.mjs (override locally with BMC_API_BASE if needed).
          API_BASE="https://panelin-calc-q74zutv7dq-uc.a.run.app"
          if [ -z "$API_AUTH_TOKEN" ]; then
            echo "::warning::API_AUTH_TOKEN secret not set — skipping voice health probe"
            exit 0
          fi
          body=$(curl -sS -o /tmp/voice-health.json -w "%{http_code}" \
            --max-time 15 \
            -H "x-api-key: $API_AUTH_TOKEN" \
            "$API_BASE/api/agent/voice/health")
          echo "HTTP $body"
          cat /tmp/voice-health.json
          echo
          if [ "$body" != "200" ]; then
            echo "::error::voice/health returned HTTP $body — OPENAI_API_KEY likely revoked or misconfigured. Run 'npm run keys:rotate' locally."
            exit 1
          fi
          if ! grep -q '"ok":true' /tmp/voice-health.json; then
            echo "::error::voice/health body has ok:false"
            exit 1
          fi

      - name: Alert on prod-smoke failure (gh#495)
        if: always()
        uses: ./.github/actions/prod-alert
        with:
          job-name: voice_health
          status: ${{ job.status }}

  knowledge_antenna:
    name: Knowledge Antenna (preflight + run)
    needs: [validate, lint]
    # continue-on-error is set on the job inside knowledge-antenna-reusable.yml
    uses: ./.github/workflows/knowledge-antenna-reusable.yml
