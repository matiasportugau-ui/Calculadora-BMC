name: CI — Panelin Calculadora BMC

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # workflow_dispatch + schedule for knowledge antenna live in
  # knowledge-antenna-scheduled.yml so they do not run channels_pipeline (prod smoke).

jobs:
  validate:
    name: Validate Calculations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install ALSA headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libasound2-dev

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Run validation tests
        run: node tests/validation.js

      - name: Build
        run: npm run build

  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install ALSA headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libasound2-dev

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Run ESLint
        run: npm run lint

  env-drift:
    name: Env drift
    runs-on: ubuntu-latest
    needs: [validate, lint]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check env-var drift
        run: node scripts/check-env-drift.mjs

  smoke:
    name: Smoke — prod API health (main only)
    runs-on: ubuntu-latest
    needs: [validate, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install ALSA headers
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libasound2-dev

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Smoke prod
        run: npm run smoke:prod

  # Prod smoke + programa + humanGate (sin secretos; URL pública por defecto en smoke-prod-api).
  # Falla si Cloud Run no responde o IA/suggest-response cae; revisar antes de release.
  # En PRs no bloquea (corre contra prod sin secretos del PR, señal informativa);
  # en push (main/develop) sigue siendo gate duro.
  channels_pipeline:
    name: Channels — automated pipeline (prod)
    runs-on: ubuntu-latest
    needs: [validate, lint]
    continue-on-error: ${{ github.event_name == 'pull_request' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install ALSA headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libasound2-dev

      - name: Install dependencies
        run: npm ci --include=dev

      - name: channels:automated (JSON)
        run: node scripts/channels-automated-pipeline.mjs

  voice_health:
    name: Voice — OpenAI key health (main only)
    runs-on: ubuntu-latest
    needs: [validate, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Probe /api/agent/voice/health on prod Cloud Run
        env:
          API_AUTH_TOKEN: ${{ secrets.API_AUTH_TOKEN }}
        run: |
          # Same default as scripts/smoke-prod-api.mjs (override locally with BMC_API_BASE if needed).
          API_BASE="https://panelin-calc-q74zutv7dq-uc.a.run.app"
          if [ -z "$API_AUTH_TOKEN" ]; then
            echo "::warning::API_AUTH_TOKEN secret not set — skipping voice health probe"
            exit 0
          fi
          body=$(curl -sS -o /tmp/voice-health.json -w "%{http_code}" \
            --max-time 15 \
            -H "x-api-key: $API_AUTH_TOKEN" \
            "$API_BASE/api/agent/voice/health")
          echo "HTTP $body"
          cat /tmp/voice-health.json
          echo
          if [ "$body" != "200" ]; then
            echo "::error::voice/health returned HTTP $body — OPENAI_API_KEY likely revoked or misconfigured. Run 'npm run keys:rotate' locally."
            exit 1
          fi
          if ! grep -q '"ok":true' /tmp/voice-health.json; then
            echo "::error::voice/health body has ok:false"
            exit 1
          fi

  knowledge_antenna:
    name: Knowledge Antenna (preflight + run)
    needs: [validate, lint]
    # continue-on-error is set on the job inside knowledge-antenna-reusable.yml
    uses: ./.github/workflows/knowledge-antenna-reusable.yml
