# Email ingest — scheduled (Gmail poller)
#
# Drives the BMC email module's unattended ingestion. Fires an authenticated
# POST to the backend's /api/email/poll-gmail, which reads the Gmail inbox that
# Cloudflare forwards the 8 BMC business boxes to, filters to the allowlist, and
# ingests each new message into CRM_Operativo + the Omni inbox (AI-extracted).
#
# Why a thin curl (not a Node CLI): the Gmail user-OAuth secrets are already
# mounted on the Cloud Run service, so the poll runs server-side. The runner
# only needs API_AUTH_TOKEN (already a repo secret) to trigger it — no GCP
# secret access, no separate Cloud Run Job, no Cloud Scheduler.
#
# Replaces the old IMAP-snapshot approach (bmcuruguay migrated to Cloudflare→
# Gmail; there is no IMAP box to snapshot). See PR introducing /api/email/poll-gmail.

name: Email ingest — scheduled

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Max messages to ingest in this run"
        required: false
        default: "50"
      dry_run:
        description: "Set to 1 to run in dry mode (no writes, no labels)"
        required: false
        default: "0"
  schedule:
    # Every 30 min during UY business hours. Cron is UTC; UY is UTC-3, so
    # 12-23 UTC ≈ 09:00-20:00 local, Mon-Fri.
    - cron: "*/30 12-23 * * 1-5"

jobs:
  poll-gmail:
    name: poll-gmail
    runs-on: ubuntu-latest
    concurrency:
      group: email-ingest-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Trigger Gmail poll
        env:
          BMC_API_BASE: ${{ vars.BMC_API_BASE_PROD || 'https://panelin-calc-642127786762.us-central1.run.app' }}
          API_AUTH_TOKEN: ${{ secrets.API_AUTH_TOKEN }}
          LIMIT: ${{ github.event.inputs.limit || '50' }}
          DRY: ${{ github.event.inputs.dry_run || '0' }}
        run: |
          set -euo pipefail
          if [ -z "${API_AUTH_TOKEN:-}" ]; then
            echo "::error::API_AUTH_TOKEN secret not set"; exit 1
          fi
          B="${BMC_API_BASE%/}"
          DRY_BOOL=false; [ "$DRY" = "1" ] && DRY_BOOL=true
          echo "POST $B/api/email/poll-gmail (limit=$LIMIT dry=$DRY_BOOL)"
          RESP=$(curl -fsS --max-time 180 -X POST "$B/api/email/poll-gmail" \
            -H "Authorization: Bearer $API_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"limit\": $LIMIT, \"dry\": $DRY_BOOL}")
          echo "Response: $RESP"
          echo "::notice::Gmail poll → $RESP"
