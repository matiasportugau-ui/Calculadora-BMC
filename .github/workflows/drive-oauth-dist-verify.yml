# Opt-in: build + comprobar que VITE_GOOGLE_CLIENT_ID quedó en dist/ (Vite bake-in).
# Requiere secret VITE_GOOGLE_CLIENT_ID. Sin secret → omitido (exit 0).
name: Drive OAuth — verify Client ID in dist

on:
  workflow_dispatch:

jobs:
  verify-dist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build and verify embed in dist
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: |
          if [ -z "$VITE_GOOGLE_CLIENT_ID" ]; then
            echo "Sin secret VITE_GOOGLE_CLIENT_ID — omitido (exit 0)."
            exit 0
          fi
          npm run build
          npm run verify:google-drive-dist
