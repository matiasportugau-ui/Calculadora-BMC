name: Dev trace (AUTOTRACE)

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Rebuild AUTOTRACE markdown
        run: python3 tools/release-traceability/scripts/rebuild_changelog.py

      - name: Release notes (tags v*)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          python3 tools/release-traceability/scripts/release_notes.py --version "$VERSION"

      - name: Verify git status
        run: |
          git status --short docs/dev-trace || true
          test -f docs/dev-trace/AUTOTRACE-STATUS.md
