# Deploy Calculator API to Cloud Run
#
# Deploys the Express calculator API to Google Cloud Run when
# server or calculation source files change on the main branch.

name: Deploy Calculator API to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'src/utils/**'
      - 'src/data/**'
      - 'Dockerfile.bmc-dashboard'
      - '.github/workflows/deploy-calc-api.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: chatbot-bmc-live
  REGION: us-central1
  SERVICE_NAME: panelin-calc
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev

jobs:
  deploy:
    name: Deploy Calculator API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }}

      - name: Build and Push Docker Image
        run: |
          IMAGE_NAME="${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/cloud-run-repo/panelin-calc"
          docker build \
            -f server/Dockerfile \
            -t "${IMAGE_NAME}:${{ github.sha }}" \
            -t "${IMAGE_NAME}:latest" \
            .
          docker push "${IMAGE_NAME}:${{ github.sha }}"
          docker push "${IMAGE_NAME}:latest"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/cloud-run-repo/panelin-calc:${{ github.sha }}
          service_account: ${{ secrets.GCP_RUNTIME_SA_EMAIL }}
          env_vars: |
            BMC_SHEET_ID=${{ secrets.BMC_SHEET_ID }}
            BMC_SHEET_SCHEMA=${{ secrets.BMC_SHEET_SCHEMA }}
            BMC_PAGOS_SHEET_ID=${{ secrets.BMC_PAGOS_SHEET_ID }}
            BMC_VENTAS_SHEET_ID=${{ secrets.BMC_VENTAS_SHEET_ID }}
            BMC_STOCK_SHEET_ID=${{ secrets.BMC_STOCK_SHEET_ID }}
            BMC_CALENDARIO_SHEET_ID=${{ secrets.BMC_CALENDARIO_SHEET_ID }}
            PUBLIC_BASE_URL=${{ secrets.PUBLIC_BASE_URL }}
            GOOGLE_APPLICATION_CREDENTIALS=/run/secrets/service-account.json
          flags: |
            --allow-unauthenticated
            --min-instances=0
            --max-instances=10
            --memory=512Mi
            --cpu=1
            --timeout=60
            --set-secrets=/run/secrets/service-account.json=panelin-service-account:latest

      - name: Show service URL
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "Calculator API deployed to: $SERVICE_URL"
          echo "Endpoints:"
          echo "  POST $SERVICE_URL/calc/cotizar"
          echo "  GET  $SERVICE_URL/calc/catalogo"
          echo "  GET  $SERVICE_URL/calc/escenarios"
