# Deploy Calculator API to Cloud Run
#
# Gated on a successful run of the "CI — Panelin Calculadora BMC" workflow on main.
# Replaces the prior `push: paths:` trigger so red-CI commits cannot ship to prod.
# The original `paths:` filter is reproduced inside the job via `git diff` so a
# main commit that touches only docs/scripts will skip the deploy steps.

name: Deploy Calculator API to Cloud Run

on:
  workflow_run:
    workflows: ["CI — Panelin Calculadora BMC"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  actions: read

concurrency:
  group: deploy-calc-api-${{ github.ref }}
  cancel-in-progress: false

env:
  PROJECT_ID: chatbot-bmc-live
  REGION: us-central1
  SERVICE_NAME: panelin-calc
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev

jobs:
  deploy:
    name: Deploy Calculator API
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Resolve commit SHA to deploy
        id: sha
        run: echo "sha=${{ github.event.workflow_run.head_sha || github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Checkout code at CI SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.sha.outputs.sha }}
          fetch-depth: 0

      - name: Confirm SHA is still tip of main
        # Defends against re-running an old successful CI run from the Actions UI,
        # which would otherwise redeploy a stale SHA over current main. workflow_dispatch
        # is intentionally exempt — it's the manual escape hatch for force-deploys.
        if: github.event_name != 'workflow_dispatch'
        run: |
          set -e
          git fetch origin main --depth=1
          REMOTE_TIP=$(git rev-parse origin/main)
          if [[ "${{ steps.sha.outputs.sha }}" != "$REMOTE_TIP" ]]; then
            echo "::error::SHA ${{ steps.sha.outputs.sha }} is no longer the tip of origin/main ($REMOTE_TIP). Aborting deploy to prevent stale-rerun rollback."
            exit 1
          fi
          echo "SHA matches origin/main tip: $REMOTE_TIP"

      - name: Skip when no relevant paths changed
        id: paths
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          # workflow_dispatch always deploys; otherwise replicate the original `paths:` filter.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::notice::workflow_dispatch — proceeding with deploy."
            exit 0
          fi

          # Find the last successful deployment SHA on main to use as diff base.
          # This ensures we don't miss changes from multi-commit pushes or rebase-merges.
          PREV_SHA=$(gh run list --workflow "${{ github.workflow }}" --branch main --status success --limit 1 --json headSha --jq '.[0].headSha' 2>/dev/null || echo "")
          
          if [ -z "$PREV_SHA" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No previous successful deploy found. Proceeding with deploy to be safe."
            exit 0
          fi

          if [ "$PREV_SHA" = "$(git rev-parse HEAD)" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Re-running successful commit. Proceeding with deploy."
            exit 0
          fi

          BASE="$PREV_SHA"
          echo "::notice::Comparing against last successful deploy: $BASE"

          if ! git rev-parse "$BASE" >/dev/null 2>&1; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Base commit $BASE not found in history; deploying."
            exit 0
          fi

          if git diff --name-only "$BASE" HEAD | grep -qE '^(server/|src/utils/|src/data/|docs/bmc-dashboard-modernization/dashboard/|\.dockerignore$|package\.json$|package-lock\.json$|Dockerfile\.bmc-dashboard$|\.github/workflows/deploy-calc-api\.yml$)'; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::No relevant paths changed since $BASE; skipping deploy."
          fi

      - name: Authenticate to Google Cloud
        if: steps.paths.outputs.skip != 'true'
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA_EMAIL }}

      - name: Set up Cloud SDK
        if: steps.paths.outputs.skip != 'true'
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        if: steps.paths.outputs.skip != 'true'
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }}

      - name: Build and Push Docker Image
        if: steps.paths.outputs.skip != 'true'
        run: |
          IMAGE_NAME="${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/cloud-run-repo/panelin-calc"
          docker build \
            -f server/Dockerfile \
            --build-arg GIT_SHA=${{ steps.sha.outputs.sha }} \
            -t "${IMAGE_NAME}:${{ steps.sha.outputs.sha }}" \
            .
          docker push "${IMAGE_NAME}:${{ steps.sha.outputs.sha }}"

      - name: Remove API_AUTH_TOKEN plain env var (one-time migration to secret)
        if: steps.paths.outputs.skip != 'true'
        run: |
          gcloud run services update ${{ env.SERVICE_NAME }} \
            --remove-env-vars=API_AUTH_TOKEN \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} || true

      - name: Deploy to Cloud Run
        if: steps.paths.outputs.skip != 'true'
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/cloud-run-repo/panelin-calc:${{ steps.sha.outputs.sha }}
          env_vars: |
            BMC_SHEET_ID=${{ secrets.BMC_SHEET_ID }}
            BMC_SHEET_SCHEMA=${{ secrets.BMC_SHEET_SCHEMA }}
            BMC_PAGOS_SHEET_ID=${{ secrets.BMC_PAGOS_SHEET_ID }}
            BMC_VENTAS_SHEET_ID=${{ secrets.BMC_VENTAS_SHEET_ID }}
            BMC_STOCK_SHEET_ID=${{ secrets.BMC_STOCK_SHEET_ID }}
            BMC_CALENDARIO_SHEET_ID=${{ secrets.BMC_CALENDARIO_SHEET_ID }}
            PUBLIC_BASE_URL=${{ secrets.PUBLIC_BASE_URL }}
            GOOGLE_APPLICATION_CREDENTIALS=/run/secrets/service-account.json
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_SECURE=${{ secrets.SMTP_SECURE }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            WA_AUTH_EMAIL_FROM=${{ secrets.WA_AUTH_EMAIL_FROM }}
            WA_JWT_SECRET=${{ secrets.WA_JWT_SECRET }}
            GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
            IDENTITY_COOKIE_DOMAIN=${{ secrets.IDENTITY_COOKIE_DOMAIN }}
            IDENTITY_COOKIE_NAME=${{ secrets.IDENTITY_COOKIE_NAME }}
            INTERNAL_SUPERADMIN_EMAILS=${{ secrets.INTERNAL_SUPERADMIN_EMAILS }}
            SHEETS_CLIENT_QUOTES_ENABLED=${{ secrets.SHEETS_CLIENT_QUOTES_ENABLED }}
            SHEETS_CLIENT_QUOTES_TAB=${{ secrets.SHEETS_CLIENT_QUOTES_TAB }}
            ASSISTANTS_ACTIVE=${{ vars.ASSISTANTS_ACTIVE }}
            OMNI_WA_SHADOW_WRITE=${{ vars.OMNI_WA_SHADOW_WRITE }}
            OMNI_ML_SHADOW_WRITE=${{ vars.OMNI_ML_SHADOW_WRITE }}
            OMNI_EMAIL_SHADOW_WRITE=${{ vars.OMNI_EMAIL_SHADOW_WRITE }}
            OMNI_EVENT_BUS_ENABLED=${{ vars.OMNI_EVENT_BUS_ENABLED }}
            OMNI_AI_ORCHESTRATOR_ENABLED=${{ vars.OMNI_AI_ORCHESTRATOR_ENABLED }}
            OMNI_AUTOMATION_ENABLED=${{ vars.OMNI_AUTOMATION_ENABLED }}
            OMNI_WA_CANONICAL=${{ vars.OMNI_WA_CANONICAL }}
            OMNI_WA_CRM_SYNC_DELAY_MS=${{ vars.OMNI_WA_CRM_SYNC_DELAY_MS }}
            OMNI_WA_READS=${{ vars.OMNI_WA_READS }}
            OMNI_AI_DAILY_BUDGET_USD=${{ vars.OMNI_AI_DAILY_BUDGET_USD }}
            GMAIL_INGEST_ADDRESSES=${{ vars.GMAIL_INGEST_ADDRESSES }}
            DRIVE_QUOTE_FOLDER_ID=${{ vars.DRIVE_QUOTE_FOLDER_ID }}
          flags: |
            --service-account=${{ secrets.GCP_RUNTIME_SA_EMAIL }}
            --allow-unauthenticated
            --min-instances=0
            --max-instances=10
            --memory=1Gi
            --cpu=1
            --timeout=60
            --set-secrets=/run/secrets/service-account.json=panelin-service-account:latest,IDENTITY_JWT_SECRET=IDENTITY_JWT_SECRET:latest,MFA_KEK_HEX=MFA_KEK_HEX:latest,DATABASE_URL=DATABASE_URL:latest,GOOGLE_TASKS_CLIENT_ID=GOOGLE_TASKS_CLIENT_ID:latest,GOOGLE_TASKS_CLIENT_SECRET=GOOGLE_TASKS_CLIENT_SECRET:latest,SUPABASE_PGP_ENCRYPT_KEY=SUPABASE_PGP_ENCRYPT_KEY:latest,SYNC_HMAC_SECRET=SYNC_HMAC_SECRET:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,GROK_API_KEY=GROK_API_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,ML_CLIENT_SECRET=ML_CLIENT_SECRET:latest,TOKEN_ENCRYPTION_KEY=TOKEN_ENCRYPTION_KEY:latest,API_AUTH_TOKEN=API_AUTH_TOKEN:latest,GMAIL_INGEST_REFRESH_TOKEN=GMAIL_INGEST_REFRESH_TOKEN:latest,GMAIL_OAUTH_CLIENT_ID=GMAIL_OAUTH_CLIENT_ID:latest,GMAIL_OAUTH_CLIENT_SECRET=GMAIL_OAUTH_CLIENT_SECRET:latest,WHATSAPP_APP_SECRET=WHATSAPP_APP_SECRET:latest,WHATSAPP_VERIFY_TOKEN=WHATSAPP_VERIFY_TOKEN:latest,WHATSAPP_ACCESS_TOKEN=WHATSAPP_ACCESS_TOKEN:latest,GOOGLE_DRIVE_CLIENT_ID=GOOGLE_DRIVE_CLIENT_ID:latest,GOOGLE_DRIVE_CLIENT_SECRET=GOOGLE_DRIVE_CLIENT_SECRET:latest,GOOGLE_DRIVE_REFRESH_TOKEN=GOOGLE_DRIVE_REFRESH_TOKEN:latest

      - name: Show service URL
        if: steps.paths.outputs.skip != 'true'
        id: service_url
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "Calculator API deployed to: $SERVICE_URL"
          echo "url=$SERVICE_URL" >> "$GITHUB_OUTPUT"
          echo "Endpoints:"
          echo "  POST $SERVICE_URL/calc/cotizar"
          echo "  GET  $SERVICE_URL/calc/catalogo"
          echo "  GET  $SERVICE_URL/calc/escenarios"

      - name: Setup Node.js (for smoke)
        if: steps.paths.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies (smoke only)
        if: steps.paths.outputs.skip != 'true'
        run: npm ci --include=dev --ignore-scripts

      - name: Smoke against just-deployed revision
        if: steps.paths.outputs.skip != 'true'
        env:
          BMC_API_BASE: ${{ steps.service_url.outputs.url }}
          # suggest-response requires auth since #567; the smoke presents this
          # as x-api-key (same as the ci.yml smoke job). Without it the hard
          # gate below fails the deploy with a 401.
          API_AUTH_TOKEN: ${{ secrets.API_AUTH_TOKEN }}
          # suggest-response is now a hard deploy gate (this env block used to set
          # SMOKE_SKIP_SUGGEST: '1'). Rationale (2026-07-04): the endpoint is a
          # go-live requirement, its provider chain has 4-deep fallback (low flake
          # risk), and the skip hid a real regression — the env_vars comma-split
          # truncating ASSISTANTS_ACTIVE would have failed the deploy smoke
          # immediately. Escape hatch: re-add the line `SMOKE_SKIP_SUGGEST: '1'`
          # to this env block, or deploy manually.
        run: npm run smoke:prod
