# Deploy Frontend to Vercel
#
# Production deploys are gated on a successful CI run on main, mirroring
# deploy-calc-api.yml. PR previews run on every PR open/update.
#
# Required GitHub secrets:
#   VERCEL_TOKEN       — personal/team token from https://vercel.com/account/tokens
#   VERCEL_ORG_ID      — read from .vercel/project.json after `vercel link`
#   VERCEL_PROJECT_ID  — read from .vercel/project.json after `vercel link`
#
# Both jobs no-op (with a notice) if VERCEL_TOKEN is missing, so adding this
# workflow before the secrets are configured does not break the repo.

name: Deploy Frontend to Vercel

on:
  workflow_run:
    workflows: ["CI — Panelin Calculadora BMC"]
    types: [completed]
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  production:
    name: Deploy production
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    concurrency:
      group: deploy-vercel-prod-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Resolve commit SHA to deploy
        id: sha
        run: echo "sha=${{ github.event.workflow_run.head_sha || github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Guard — skip cleanly if Vercel secrets not configured
        id: guard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [[ -z "${VERCEL_TOKEN}" || -z "${VERCEL_ORG_ID}" || -z "${VERCEL_PROJECT_ID}" ]]; then
            echo "::warning::Vercel secrets not configured; skipping deploy. Add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID to enable."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout at CI SHA
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.sha.outputs.sha }}
          fetch-depth: 0

      - name: Confirm SHA is still tip of main
        # Defends against re-running an old successful CI run from the Actions UI,
        # which would otherwise redeploy a stale SHA. workflow_dispatch is exempt.
        if: steps.guard.outputs.skip != 'true' && github.event_name != 'workflow_dispatch'
        run: |
          set -e
          git fetch origin main --depth=1
          REMOTE_TIP=$(git rev-parse origin/main)
          if [[ "${{ steps.sha.outputs.sha }}" != "$REMOTE_TIP" ]]; then
            echo "::error::SHA ${{ steps.sha.outputs.sha }} is no longer the tip of origin/main ($REMOTE_TIP). Aborting Vercel prod deploy."
            exit 1
          fi
          echo "SHA matches origin/main tip: $REMOTE_TIP"

      - name: Setup Node.js
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Vercel CLI
        if: steps.guard.outputs.skip != 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        if: steps.guard.outputs.skip != 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        if: steps.guard.outputs.skip != 'true'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (production)
        if: steps.guard.outputs.skip != 'true'
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "Deployed: $DEPLOY_URL"
          echo "DEPLOY_URL=$DEPLOY_URL" >> "$GITHUB_ENV"

      - name: Smoke production HTML
        if: steps.guard.outputs.skip != 'true'
        run: |
          set -e
          STATUS=$(curl -sI -o /dev/null -w "%{http_code}" --max-time 15 https://calculadora-bmc.vercel.app/)
          if [[ "$STATUS" != "200" ]]; then
            echo "::error::Vercel prod HTML returned $STATUS (expected 200)"
            exit 1
          fi
          echo "Vercel prod HTML 200 OK."

  preview:
    name: Deploy preview
    runs-on: ubuntu-latest
    # Same-repo PRs only. Forks must not run because this job hands VERCEL_TOKEN
    # to `vercel build`, which executes PR-controlled code (postinstall scripts,
    # vite plugins, etc). Fork support, if ever needed, requires the safer
    # `pull_request_target` pattern with no checkout of PR code into the
    # secret-bearing job.
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    concurrency:
      group: deploy-vercel-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Guard — skip cleanly if Vercel secrets not configured
        id: guard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [[ -z "${VERCEL_TOKEN}" || -z "${VERCEL_ORG_ID}" || -z "${VERCEL_PROJECT_ID}" ]]; then
            echo "::warning::Vercel secrets not configured; skipping preview."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR head
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Vercel CLI
        if: steps.guard.outputs.skip != 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        if: steps.guard.outputs.skip != 'true'
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        if: steps.guard.outputs.skip != 'true'
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        if: steps.guard.outputs.skip != 'true'
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Preview: $URL"

      - name: Comment preview URL on PR
        if: steps.guard.outputs.skip != 'true' && steps.deploy.outputs.url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const body = `Vercel preview for \`${sha}\`: ${url}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
