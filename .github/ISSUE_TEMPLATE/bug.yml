name: "🐛 Bug"
description: "Algo no funciona como debería"
title: "[fix] "
labels: ["type:fix"]
body:
  - type: textarea
    id: summary
    attributes:
      label: "Resumen"
      description: "Qué está roto, en una o dos frases."
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: "Pasos para reproducir"
      value: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected_actual
    attributes:
      label: "Esperado vs. actual"
      value: |
        **Esperado:**
        **Actual:**
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: "Entorno"
      description: "prod / local / Cloud Run / Vercel, rama, rev, navegador…"
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: "Área"
      description: "Subsistema. Aplicá el label `area:*` elegido — el form auto-aplica sólo `type:*`."
      options:
        - "area:calc"
        - "area:api"
        - "area:sheets"
        - "area:auth"
        - "area:pdf"
        - "area:chat"
        - "area:deploy"
        - "area:infra"
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: "Prioridad"
      description: "Mapea con /nxt (§5). Aplicá el label `priority:P*` elegido — el form auto-aplica sólo `type:*`."
      options:
        - "priority:P0 — 🔴 Crítico"
        - "priority:P1 — 🟠 Alto"
        - "priority:P2 — 🟡 Medio"
        - "priority:P3 — 🔵 Bajo"
    validations:
      required: true
