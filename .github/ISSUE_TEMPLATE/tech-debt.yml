name: "🧹 Deuda técnica / refactor"
description: "Limpieza, refactor, mejora de calidad o de infraestructura"
title: "[refactor] "
labels: ["type:refactor"]
body:
  - type: textarea
    id: current
    attributes:
      label: "Estado actual"
      description: "Qué existe hoy y por qué es deuda (riesgo, fricción, costo)."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: "Limpieza propuesta"
      description: "Qué dejar mejor y por qué vale la pena ahora."
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: "Criterios de aceptación"
      value: |
        - [ ] ...
        - [ ] Sin regresiones: `npm run gate:local` verde
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: "Área"
      description: "Subsistema. Aplicá el label `area:*` elegido — el form auto-aplica sólo `type:*`."
      options:
        - "area:calc"
        - "area:api"
        - "area:sheets"
        - "area:auth"
        - "area:pdf"
        - "area:chat"
        - "area:deploy"
        - "area:infra"
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: "Prioridad"
      description: "Mapea con /nxt (§5). Aplicá el label `priority:P*` elegido — el form auto-aplica sólo `type:*`."
      options:
        - "priority:P0 — 🔴 Crítico"
        - "priority:P1 — 🟠 Alto"
        - "priority:P2 — 🟡 Medio"
        - "priority:P3 — 🔵 Bajo"
    validations:
      required: true
