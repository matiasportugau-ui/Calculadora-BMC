name: "✨ Feature / mejora"
description: "Nueva funcionalidad o mejora de desarrollo"
title: "[feat] "
labels: ["type:feat"]
body:
  - type: textarea
    id: problem
    attributes:
      label: "Problema / motivación"
      description: "¿Qué necesidad resuelve? ¿Qué lo originó?"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: "Propuesta"
      description: "Qué construir, a alto nivel."
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: "Criterios de aceptación (Definition of Done)"
      description: "Lista verificable de qué es «hecho». Ver docs/team/AGILE.md §3."
      value: |
        - [ ] ...
        - [ ] `npm run gate:local` verde
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: "Área"
      description: "Subsistema. Aplicá el label `area:*` elegido — el form auto-aplica sólo `type:*`."
      options:
        - "area:calc"
        - "area:api"
        - "area:sheets"
        - "area:auth"
        - "area:pdf"
        - "area:chat"
        - "area:deploy"
        - "area:infra"
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: "Prioridad"
      description: "Mapea con /nxt (§5). Aplicá el label `priority:P*` elegido — el form auto-aplica sólo `type:*`."
      options:
        - "priority:P0 — 🔴 Crítico"
        - "priority:P1 — 🟠 Alto"
        - "priority:P2 — 🟡 Medio"
        - "priority:P3 — 🔵 Bajo"
    validations:
      required: true
