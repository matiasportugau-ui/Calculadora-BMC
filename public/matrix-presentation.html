<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Panelin — Matrix · BMC</title>
  <style>
    :root {
      --matrix-green: #00ff41;
      --matrix-dim: #003b0f;
      --hud-bg: rgba(0, 12, 0, 0.85);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: "JetBrains Mono", "Fira Code", "SF Mono", Consolas, monospace;
    }
    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    #hud {
      position: fixed;
      left: 2rem;
      top: 2rem;
      max-width: min(520px, 92vw);
      padding: 1rem 1.25rem;
      background: var(--hud-bg);
      border: 1px solid var(--matrix-green);
      color: var(--matrix-green);
      text-shadow: 0 0 8px rgba(0, 255, 65, 0.6);
      font-size: 12px;
      line-height: 1.45;
      z-index: 10;
      pointer-events: auto;
    }
    #hud h1 {
      margin: 0 0 0.5rem;
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    #hud table { width: 100%; border-collapse: collapse; }
    #hud td { padding: 2px 6px 2px 0; vertical-align: top; }
    #hud td:first-child { color: #7dff9a; white-space: nowrap; }
    #hud .actions {
      margin-top: 0.75rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    #hud button {
      background: transparent;
      border: 1px solid var(--matrix-green);
      color: var(--matrix-green);
      font-family: inherit;
      font-size: 11px;
      padding: 0.35rem 0.65rem;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    #hud button:hover { background: rgba(0, 255, 65, 0.12); }
    #hud .err { color: #ff5555; text-shadow: none; }
    #ticker {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.5rem 1rem;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.92));
      color: var(--matrix-dim);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      z-index: 9;
    }
    #ticker span {
      display: inline-block;
      animation: scroll 40s linear infinite;
      color: var(--matrix-green);
      opacity: 0.85;
    }
    @keyframes scroll {
      0% { transform: translateX(100vw); }
      100% { transform: translateX(-100%); }
    }
  </style>
</head>
<body>
  <canvas id="canvas" aria-hidden="true"></canvas>
  <div id="hud">
    <h1>Calculadora BMC / Panelin</h1>
    <div id="status">Cargando datos…</div>
    <div class="actions">
      <button type="button" id="btn-refresh">Actualizar datos</button>
      <button type="button" id="btn-poll">Auto: <span id="poll-label">ON · 20s</span></button>
    </div>
  </div>
  <div id="ticker"><span id="ticker-text">…</span></div>
  <script>
    const DATA_URL = "/presentation-data.json";
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");
    const tickerText = document.getElementById("ticker-text");

    let presentation = null;
    let pollTimer = null;
    let pollEnabled = true;
    const POLL_MS = 20000;

    const chars =
      "ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉ0123456789ﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝABCDEF";

    let columns = [];
    function resize() {
      canvas.width = window.innerWidth * devicePixelRatio;
      canvas.height = window.innerHeight * devicePixelRatio;
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
      const w = window.innerWidth;
      const fontSize = 14;
      const colCount = Math.ceil(w / fontSize);
      columns = Array.from({ length: colCount }, () => ({
        y: Math.random() * -2000,
        speed: 0.8 + Math.random() * 2.2,
        len: 12 + Math.floor(Math.random() * 28),
      }));
    }
    window.addEventListener("resize", resize);
    resize();

    function drawFrame() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
      ctx.fillRect(0, 0, w, h);
      const fontSize = 14;
      ctx.font = `${fontSize}px JetBrains Mono, monospace`;
      for (let i = 0; i < columns.length; i++) {
        const c = columns[i];
        const x = i * fontSize;
        for (let j = 0; j < c.len; j++) {
          const y = c.y - j * fontSize;
          if (y < -40 || y > h + 40) continue;
          const ch = chars[(i * 17 + j * 11 + (c.y | 0)) % chars.length];
          const alpha = j === 0 ? 1 : Math.max(0.15, 1 - j / (c.len * 1.2));
          ctx.fillStyle = j === 0 ? "#ccffdd" : `rgba(0, 255, 65, ${alpha})`;
          ctx.fillText(ch, x, y);
        }
        c.y += c.speed;
        if (c.y - c.len * fontSize > h) {
          c.y = Math.random() * -800;
          c.speed = 0.8 + Math.random() * 2.2;
          c.len = 12 + Math.floor(Math.random() * 28);
        }
      }
      requestAnimationFrame(drawFrame);
    }
    drawFrame();

    function esc(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function renderHud(data) {
      if (!data) {
        statusEl.innerHTML = '<span class="err">Sin datos. Ejecutá <code>npm run readme:generate</code> o <code>npm run readme:sync</code>.</span>';
        return;
      }
      const rows = [
        ["Paquete", `${data.name} @ ${data.packageVersion}`],
        ["Generado (UTC)", data.generatedAt],
        ["Git", `${data.git?.short || "—"} · ${data.git?.branch || "—"}`],
        ["CALCULATOR_DATA_VERSION", `${data.calculatorData?.hash || "—"} · ${data.calculatorData?.date || ""}`],
        ["Tests", data.tests?.skipped ? "omitidos (--skip-tests)" : `validation ${data.tests?.validationPassed ?? "?"} · roof ${data.tests?.roofVisualOk ?? "?"}`],
        ["Stack", `React ${data.stack?.react} · Vite ${data.stack?.vite} · Express ${data.stack?.express}`],
      ];
      statusEl.innerHTML =
        "<table>" +
        rows.map(([k, v]) => `<tr><td>${esc(k)}</td><td>${esc(v)}</td></tr>`).join("") +
        "</table>";
      const lines = data.matrixLines && data.matrixLines.length ? data.matrixLines : ["BMC / PANELIN"];
      tickerText.textContent = lines.join("   ·   ") + "   ·   ";
    }

    async function loadData() {
      try {
        const url = DATA_URL + "?t=" + Date.now();
        const res = await fetch(url, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        presentation = await res.json();
        renderHud(presentation);
      } catch (e) {
        statusEl.innerHTML =
          '<span class="err">No se pudo leer presentation-data.json. ¿Corriste el generador? (' +
          esc(e.message) +
          ")</span>";
      }
    }

    function startPoll() {
      if (pollTimer) clearInterval(pollTimer);
      if (!pollEnabled) return;
      pollTimer = setInterval(loadData, POLL_MS);
    }

    document.getElementById("btn-refresh").addEventListener("click", () => loadData());

    document.getElementById("btn-poll").addEventListener("click", () => {
      pollEnabled = !pollEnabled;
      document.getElementById("poll-label").textContent = pollEnabled ? "ON · 20s" : "OFF";
      if (pollTimer) clearInterval(pollTimer);
      if (pollEnabled) startPoll();
    });

    loadData();
    startPoll();
  </script>
</body>
</html>
