# Cloud Build config — image build only.
# Env vars (BMC_*, IDENTITY_*, GOOGLE_OAUTH_CLIENT_ID, SHEETS_CLIENT_QUOTES_*,
# WA_*, SMTP_*) are injected at deploy time by the
# `google-github-actions/deploy-cloudrun@v3` step in
# .github/workflows/deploy-calc-api.yml — keep this file image-only so a
# manual `gcloud builds submit` doesn't surprise-rotate runtime config.
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'server/Dockerfile'
      - '-t'
      - '$_IMAGE:latest'
      - '.'
images:
  - '$_IMAGE:latest'
substitutions:
  _IMAGE: us-central1-docker.pkg.dev/chatbot-bmc-live/cloud-run-repo/panelin-calc
