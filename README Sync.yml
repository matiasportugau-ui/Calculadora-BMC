name: README Sync

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: write

jobs:
  sync-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate README from manifest
        run: node scripts/generate-readme.js

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- README.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit README changes (push only)
        if: github.event_name == 'push' && steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs(readme): auto-sync generated section"
          git push

      - name: Fail if README stale in PR
        if: github.event_name == 'pull_request' && steps.changes.outputs.changed == 'true'
        run: |
          echo "README.md is stale. Run: node scripts/generate-readme.js and commit changes."
          exit 1
