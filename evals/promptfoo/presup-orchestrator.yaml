description: Presupuestacion Orchestrator — Core Gates Regression (Phase A starter)
prompts:
  - file://../../server/prompts/presup-orchestrator/PricingBOMReviewer.md
  - file://../../server/prompts/presup-orchestrator/DocumentGatekeeper.md

providers:
  # Primary high-quality models for the orchestrator
  - anthropic:messages:claude-sonnet-4-6
  - anthropic:messages:claude-opus-4-7
  # Fast smoke / cost checks
  - anthropic:messages:claude-haiku-4-5-20251001

defaultTest:
  options:
    # Grading provider for llm-rubric assertions (must be a concrete model ID in current promptfoo).
    # Using Sonnet for quality of rubric judgments; swap to haiku for cheaper eval runs.
    provider: anthropic:claude-sonnet-4-6

tests:
  # Pricing & BOM Reviewer gate (highest impact per architecture)
  - vars:
      input: |
        Cliente: Metalúrgica del Sur
        Escenario: Techo + Fachada
        Área total: 420 m²
        Altura: 7.5 m
        Zona: 3 (Montevideo)
        Tipo: Naves industriales
        Panel propuesto: PIR 80mm
        Precio unitario web: USD 48.50 /m²
        Descuento aplicado: 12%
    assert:
      - type: contains
        value: "USD"
      - type: llm-rubric
        value: |
          El reviewer debe:
          - Detectar si el precio está dentro de rangos históricos razonables para la zona y tipo de obra.
          - Señalar anomalías (precio demasiado bajo/alto, descuento excesivo).
          - Sugerir verificación de espesor o tipo de panel si corresponde.
          - Responder en español técnico pero claro.
          - Nunca inventar precios de la matriz.
      - type: cost
        threshold: 0.08  # cheap enough for frequent regression

  # Document Gatekeeper (PDF quality)
  - vars:
      input: |
        PDF generado con layout: simple-carbon
        quoteId: BMC-2026-0087
        version: 2
        Elementos presentes: Resumen técnico, BOM detallado, totales con IVA, pie con código QR y fecha.
        Faltantes detectados por métricas: Ninguno crítico.
        Observaciones visuales: Márgenes correctos, tipografía legible, sin solapamientos.
    assert:
      - type: contains
        value: "simple-carbon"
      - type: llm-rubric
        value: |
          El gatekeeper debe:
          - Verificar que quoteId y version aparezcan claramente.
          - Confirmar que el layout recomendado (simple-carbon) fue usado.
          - Señalar si falta información obligatoria (totales, BOM, condiciones).
          - Dar veredicto claro: PASS / CONDITIONAL / FAIL con razones.
          - Mantener tono profesional y accionable.
      - type: cost
        threshold: 0.06

  # --- Casos reales (snapshot Admin 2.0 — scripts/evals/quote-eval-report.json) ---

  # Consulta incompleta WA — debe señalar datos faltantes, no inventar BOM
  - vars:
      input: |
        Consulta cruda (WhatsApp): "5.5m * 6 panel"
        Contexto: cliente no especificó familia ni espesor.
        Propuesta parcial del sistema: Isopanel sin confirmar.
    assert:
      - type: llm-rubric
        value: |
          Debe indicar que faltan datos (familia, espesor, dimensiones o área).
          No debe inventar precios ni totales cerrados.
          Tono profesional en español.

  # Cotización dual área — caso que sí llega a calc en evals offline
  - vars:
      input: |
        Consulta: "URGENTE: iSODEC eps 150MM + iSOPANEL 100MM / 350 M2 DE CADA UNO. Montevideo"
        Escenario: Pared
        Área estimada: 350 m² por producto
        Zona: 3
        Precio referencia web Isodec 150mm: USD 42 /m²
        Descuento aplicado: 0%
    assert:
      - type: contains
        value: "350"
      - type: llm-rubric
        value: |
          Debe revisar coherencia de áreas duplicadas y espesores.
          Mencionar USD o rangos razonables.
          Señalar si falta altura o detalle constructivo.

  # Atención manual — largo excede lmax (engine guardrail)
  - vars:
      input: |
        Consulta: "Isopanel e Isodec 100mm / Altura minima 2,5m — largo panel 100m"
        Panel: ISODEC_EPS 100mm
        Largo declarado: 100 m
        Lmax catálogo: 14 m
    assert:
      - type: llm-rubric
        value: |
          Debe detectar que 100m excede lmax 14m o marcar riesgo de atención manual.
          No debe aprobar silenciosamente un BOM imposible.

  # Consulta vaga — chapas con aislante
  - vars:
      input: |
        Consulta: "Precio de chapas con aislante termico"
        Sin medidas ni espesor ni zona.
    assert:
      - type: llm-rubric
        value: |
          Debe pedir familia, espesor y dimensiones antes de cerrar precio.
          No inventar cotización numérica completa.

  # Document Gatekeeper — PDF con quoteId faltante (debe FAIL o CONDITIONAL)
  - vars:
      input: |
        PDF generado con layout: simple-carbon
        quoteId: (ausente)
        version: 1
        Elementos: BOM parcial, totales sin IVA desglosado.
        Observaciones: pie de página cortado en móvil.
    assert:
      - type: llm-rubric
        value: |
          Debe marcar FAIL o CONDITIONAL por quoteId ausente o totales incompletos.
          Listar acciones concretas para corregir antes de enviar al cliente.

# Usage (local):
# doppler run -- npx promptfoo eval -c evals/promptfoo/presup-orchestrator.yaml --no-cache
# npx promptfoo view
#
# (Secrets live in Doppler bmc-frontend/prd; plain .env does not contain the real ANTHROPIC_API_KEY.)
#
# This is the starter set for the presupuestacion-orchestrator.
# Expand with more cases from real runs + historical data as the skill matures.

  # --- Seg (Post-Mortem & Learning / Seguimiento) cases (Phase A extension) ---

  # Typical successful quote → should recommend useful follow-up
  - vars:
      input: |
        Flujo completado.
        quoteId: BMC-2026-0142
        Cliente: Frigorífico del Norte
        Escenario: Techo industrial 850m²
        Total: USD 48,200
        Veredicto Pricing: OK (descuento 9%)
        Veredicto PDF: PASS
        Canal: WhatsApp
        Observaciones conductor: Cliente pidió seguimiento en 5 días para confirmar pedido.
    assert:
      - type: llm-rubric
        value: |
          El especialista seg debe:
          - Proponer un seguimiento concreto y accionable (título claro + detalle útil).
          - Sugerir fecha razonable (ej. 5-7 días).
          - Incluir tags útiles (presup, post-mortem, cliente).
          - No inventar datos del caso.

  # Caso con riesgo de precio → seguimiento más cercano
  - vars:
      input: |
        quoteId: BMC-2026-0143
        Cliente: Constructora Sur
        Descuento aplicado: 22% (alto)
        Pricing Reviewer: REVISAR
        Estado final: awaiting_approval (con nota de revisión)
    assert:
      - type: llm-rubric
        value: |
          Debe recomendar seguimiento cercano (24-48h) para seguimiento de aprobación o ajuste de precio.
          Título y detalle deben reflejar el riesgo de descuento alto.
